apiVersion: vendir.k14s.io/v1alpha1
kind: Config

# Relative to ci/
directories:
- path: ../.github/workflows/vendor
  contents:
  - path: . # Copy this folder out to ..
    git:
      url: https://github.com/blinkbitcoin/concourse-shared.git
      ref: 43a32a3f830f6b23cc5326b7d98e950121bb637b
    includePaths:
    - shared/actions/*
    excludePaths:
    - shared/actions/rust-*
    - shared/actions/tofu-*
    newRootPath: shared/actions

- path: ./vendor
  contents:
  - path: .
    git:
      url: https://github.com/blinkbitcoin/concourse-shared.git
      ref: 43a32a3f830f6b23cc5326b7d98e950121bb637b
    includePaths:
    - shared/ci/**/*
    excludePaths:
    - shared/ci/**/rust-*
    - shared/ci/**/tofu-*
    newRootPath: shared/ci

- path: ../bin/vendor
  contents:
  - path: .
    git:
      url: https://github.com/blinkbitcoin/concourse-shared.git
      ref: 43a32a3f830f6b23cc5326b7d98e950121bb637b
    includePaths:
    - shared/bin/**/*
    excludePaths:
    - shared/bin/**/rust-*
    - shared/bin/**/tofu-*
    newRootPath: shared/bin

