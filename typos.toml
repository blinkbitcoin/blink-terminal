[files]
# Bundled Bitcoin-quote/calendar dataset (lib/orangepill/data) contains many
# proper nouns, foreign words, and verbatim quotes; exclude from spell check.
extend-exclude = ["CHANGELOG.md", "lib/orangepill/data/"]

[default.extend-words]
# MENA = Middle East & North Africa region
mena = "mena"
# chaching = sound effect (ka-ching), not "caching"
chaching = "chaching"
# JOD = Jordanian Dinar (ISO 4217 currency code)
JOD = "JOD"
# .ist = TLD for Istanbul/Turkey
ist = "ist"
